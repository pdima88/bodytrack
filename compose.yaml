services:
  app:
    build: .
    ports:
      - "8000:80"
    env_file: .env
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    volumes:
      - dbdata:/data
    depends_on:
      - mailpit
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
    restart: unless-stopped

volumes:
  dbdata:
